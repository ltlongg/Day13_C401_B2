alerts:
  - name: high_latency_p95
    severity: P2
    metric: latency_p95
    condition: latency_p95 > 3000 for 15m
    type: symptom-based
    owner: team-observability
    dashboard_panel: Latency P50/P95/P99
    runbook: docs/alerts.md#1-high-latency-p95
  - name: high_error_rate
    severity: P1
    metric: error_breakdown.rate_pct
    condition: error_breakdown.rate_pct > 5 for 5m
    type: symptom-based
    owner: team-observability
    dashboard_panel: Error rate with breakdown
    runbook: docs/alerts.md#2-high-error-rate
  - name: cost_budget_spike
    severity: P2
    metric: avg_cost_usd
    condition: avg_cost_usd > 0.05 for 15m
    type: symptom-based
    owner: team-observability
    dashboard_panel: Cost over time
    runbook: docs/alerts.md#3-cost-budget-spike
