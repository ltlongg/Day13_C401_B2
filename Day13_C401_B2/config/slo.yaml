service: student-assistant-api
source: GET /metrics
window: process_lifetime
review_window: 28d
slis:
  latency_p95:
    metric: latency_p95
    unit: ms
    objective_lte: 3000
    target_pct: 99.0
  error_rate:
    metric: error_breakdown.rate_pct
    unit: pct
    objective_lte: 5.0
    target_pct: 99.0
  avg_cost:
    metric: avg_cost_usd
    unit: usd_per_request
    objective_lte: 0.05
    target_pct: 95.0
  quality_avg:
    metric: quality_avg
    unit: score
    objective_gte: 0.75
    target_pct: 95.0
notes:
  - traffic, total_cost_usd, tokens_in_total, and tokens_out_total stay available for dashboard panels and drill-downs
  - thresholds are aligned with docs/lab13-integration-contract.md metrics contract
